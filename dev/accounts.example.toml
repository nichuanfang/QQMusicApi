# 复制为 web/accounts.toml 并填入账号信息。
# 支持两种写法: 平铺字段, 或直接粘贴 Credential JSON 到 credential 多行字符串。

[[account]]
musicid = 0
musickey = ""
openid = ""
refresh_token = ""
access_token = ""
expired_at = 0
unionid = ""
str_musicid = ""
refresh_key = ""
musickey_create_time = 0
key_expires_in = 0
first_login = 0
bind_account_type = 0
need_refresh_key_in = 0
encrypt_uin = ""
# 不填写 login_type 时会根据 musickey 自动推断。
login_type = 0

