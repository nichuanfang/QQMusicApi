services:
  qq-music-api:
    build:
      context: ..
      dockerfile: ./web/Dockerfile
    image: qm
    container_name: qm
    environment:
      - TZ=Asia/Shanghai
      - QQMUSIC_SERVER_HOST=0.0.0.0
      - HTTP_PROXY=http://127.0.0.1:10809
      - HTTPS_PROXY=http://127.0.0.1:10809
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - ./data:/app/web/data
      - ./accounts.toml:/app/web/accounts.toml:ro
      - ./config.toml:/app/web/config.toml:ro
    expose:
      - 8000
    network_mode: host
    restart: always